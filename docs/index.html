<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repository Browser</title>
  <meta name="description" content="Minimal browser for files in this public GitHub repository.">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <header class="topbar">
    <div>
      <h1>Repository Browser</h1>
      <p class="subtitle" id="repo-label">Detecting repository…</p>
    </div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme">Theme</button>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="Repository file tree">
      <div class="status" id="status" aria-live="polite">Loading…</div>
      <label class="search-box">
        <span>Filter</span>
        <input id="filter" type="search" placeholder="Search current tree">
      </label>
      <nav class="tree" id="tree"></nav>
    </aside>

    <section class="viewer-wrap">
      <div class="viewer-head">
        <div>
          <div class="crumbs" id="breadcrumbs">/</div>
          <h2 id="file-title">Repository root</h2>
        </div>
        <div class="actions" id="actions"></div>
      </div>
      <article class="viewer" id="content">
        <div class="empty-state">
          <p>Loading repository contents.</p>
        </div>
      </article>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
